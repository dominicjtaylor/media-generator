# Railway build config
#
# The React frontend is pre-built and committed to frontend/dist/.
# To update the frontend: cd frontend && npm run build  →  commit  →  push.
#
# Playwright's Chromium browser is installed at build time so rendering
# works immediately on first request.

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install --with-deps chromium"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
