# Railway build config — Nixpacks
#
# PLAYWRIGHT_BROWSERS_PATH is set explicitly inline on every playwright command
# (not relied upon from [variables], which only applies at runtime) so that the
# build phase writes Chromium into /app and the runtime container finds it there.

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p /app/.playwright-browsers",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers python -m playwright install-deps chromium",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers python -m playwright install chromium",
  "ls /app/.playwright-browsers || echo 'NO BROWSERS FOUND — install failed'"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
