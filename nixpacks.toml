# Railway build config — Nixpacks
#
# The React frontend is pre-built and committed to frontend/dist/.
# To update the frontend: cd frontend && npm run build  →  commit  →  push.
#
# PLAYWRIGHT_BROWSERS_PATH pins the Chromium binary to /app/.playwright-browsers
# (inside the app working directory).  This guarantees the binary is present in
# the runtime container — Railway's Nixpacks multi-stage build does NOT reliably
# carry over ~/.cache between build and runtime.

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install --with-deps chromium"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
