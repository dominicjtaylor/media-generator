# Railway build config — Nixpacks
#
# The React frontend is pre-built and committed to frontend/dist/.
# To update the frontend: cd frontend && npm run build  →  commit  →  push.
#
# PLAYWRIGHT_BROWSERS_PATH is set in [variables] (runtime) AND inline in the
# install command (build phase).  Both are required because Nixpacks does not
# guarantee that [variables] entries are exported into the build shell.
# Pinning to /app/.playwright-browsers ensures the binary is inside the app
# working directory, which IS copied into the runtime container.

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.playwright-browsers"

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "PLAYWRIGHT_BROWSERS_PATH=/app/.playwright-browsers python -m playwright install --with-deps chromium"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port $PORT"
