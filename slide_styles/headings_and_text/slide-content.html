<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Content Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:linear-gradient(135deg,#111,#0a0a0a);
  color:#fff;
  padding:100px 90px;
  position:relative;
  overflow:hidden;
}

.grain {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0.04;
  pointer-events:none;
  z-index:0;
}

/* ---------- TEXT ---------- */

.brand {
  font-size:34px;
  color:#cfcfcf;
  opacity:.85;
  position:relative;
  z-index:1;
}

.swipe {
  margin-top:50px;
  display:inline-block;
  border:1px solid rgba(255,255,255,.4);
  border-radius:999px;
  padding:6px 18px;
  font-size:24px;
  letter-spacing:3px;
  color:#ccc;
  position:relative;
  z-index:1;
}

.tag {
  margin-top:22px;
  display:inline-block;
  border:1px solid rgba(255,255,255,.3);
  border-radius:999px;
  padding:5px 16px;
  font-size:18px;
  letter-spacing:3px;
  color:#aaa;
  position:relative;
  z-index:1;
}

.heading-wrap {
  display:flex;
  align-items:flex-start;
  gap:22px;
  margin-top:18px;
  position:relative;
  z-index:1;
}

.accent-bar {
  width:4px;
  background:var(--accent);
  border-radius:2px;
  align-self:stretch;
  flex-shrink:0;
  min-height:40px;
}

.heading {
  font-family:'Anton', sans-serif;
  font-size:75px;
  font-weight:400;
  line-height:1.1;
  max-width:780px;
}

/* Force Anton on any child elements (e.g. <strong> from markdown) */
.heading * {
  font-family:'Anton', sans-serif;
}

.divider {
  height:1px;
  background:rgba(255,255,255,.15);
  margin-top:22px;
  max-width:820px;
  position:relative;
  z-index:1;
}

.text {
  margin-top:20px;
  font-size:51px;
  font-weight:300;
  line-height:1.1;
  max-width:820px;
  position:relative;
  z-index:1;
}

.text strong {
  font-weight:700;
}

.cta {
  margin-top:60px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  border:1px solid rgba(255,255,255,.4);
  border-radius:999px;
  padding:12px 24px;
  font-size:26px;
  position:relative;
  z-index:1;
}

.logo {
  width:40px;
  height:40px;
  border-radius:50%;
}

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:34px;
  opacity:.7;
  z-index:3;
}

.slide-counter {
  position:absolute;
  right:90px;
  bottom:calc(var(--bar-height-pos) + 20px);
  font-size:30px;
  color:rgba(255,255,255,.3);
  font-family:'Inter', sans-serif;
  z-index:3;
}

/* ---------- SHARED ACCENT SYSTEM ---------- */

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --accent:#e84a24;

  /* derived value = EXACT bar height */
  --bar-height-pos: calc(var(--circle-bottom) + (var(--circle-size) / 2));
}

.bar {
  position:absolute;
  left:0;
  width:100%;
  height:12px;
  background:var(--accent);
  bottom:var(--bar-height-pos);
  z-index:2;
}

</style>
</head>

<body>
<div class="slide">

  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)"/>
  </svg>

  <div class="brand">Claude Insights</div>

  <div class="swipe">SWIPE</div>

  <div class="tag">{{TAG}}</div>

  <div class="heading-wrap">
    <div class="accent-bar"></div>
    <div class="heading">{{HEADING}}</div>
  </div>

  <div class="divider"></div>

  <div class="text">{{TEXT}}</div>

  <div class="cta">
    <img src="../../logo.png" class="logo">
    Claude Insights
  </div>

  <div class="handle">@claudeinsights</div>

  <div class="slide-counter">{{SLIDE_COUNTER}}</div>

  <div class="bar"></div>

</div>
</body>
</html>
