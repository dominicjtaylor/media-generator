<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Slide 1</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:linear-gradient(135deg,#111,#0a0a0a);
  color:#fff;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:100px;
}

/* ---------- HANDLE ---------- */

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:30px;
  opacity:1;
  z-index:3;
  text-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 20px 80px rgba(0,0,0,0.4);
}

/* ---------- CENTRED CONTENT BLOCK ---------- */

/* .content-center {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:42px;
  text-align:center;
  padding:0 18px;
  max-width:960px;
  width:100%;
} */

.content-center {
  position: absolute;

  top: 100px;
  bottom: 100px;
  left: 80px;
  right: 80px;

  display: flex;
  flex-direction: column;
  justify-content: center;   /* vertical centering */
  align-items: center;   
  text-align: center;
}

.swipe {
  /* margin-top: -820px; */
  margin-top: -150px;
  background: #fff;
  display:inline-block;
  border-radius:999px;
  padding:6px 18px;
  font-size:24px;
  font-weight: 700;
  letter-spacing:2px;
  color:#111;
  z-index: 4;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 20px 80px rgba(0,0,0,0.4);
}

.headline {
  margin-top: 50px;
  font-family:'Inter', sans-serif;
  font-size:120px;
  letter-spacing: -0.06em;
  font-weight: 600;
  line-height:1;
  max-width: 800px;
  display: block;
  text-align:left;
  color: #fff;
  z-index: 4;

  text-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 20px 80px rgba(0,0,0,0.4);
}

.headline strong {
  font-weight:700;
}

.serif {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 160px;
  font-weight: 500;
}

/* ---------- IMAGE SYSTEM (BOTTOM-LOCKED) ---------- */

.image-box {
  position:absolute;
  bottom:0px;
  top: 0px;
  left:50%;
  transform:translateX(-50%);
  /* width:2000px; */
  width: 100%;
  /* height:clamp(320px, 300vh, 1000px); */
  /* border-radius:28px; */
  overflow:hidden;
  z-index:1;
  /* background-color: #111; */
}

.image-box img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  opacity: 1;
}

/* ---------- ACCENT SYSTEM ---------- */

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --circle-right:80px;
  --accent:#e84a24;
}

.circle {
  position:absolute;
  right:var(--circle-right);
  bottom:var(--circle-bottom);
  width:var(--circle-size);
  height:var(--circle-size);
  background:var(--accent);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:600;
  z-index:2;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 20px 80px rgba(0,0,0,0.4);
}

.bar {
  position:absolute;
  height:12px;
  background:var(--accent);
  bottom:calc(var(--circle-bottom) + (var(--circle-size) / 2));
  left:calc(100% - var(--circle-right) - (var(--circle-size) / 2));
  width:calc(var(--circle-right) + (var(--circle-size) / 2));
  z-index:1;
  box-shadow:
    0 10px 40px rgba(0,0,0,0.4),
    0 20px 80px rgba(0,0,0,0.8);
}

</style>
</head>

<body>
<div class="slide">

  <div class="content-center">
    <div class="swipe">SWIPE</div>
    <div class="headline">
      {{TEXT}}
    </div>
  </div>

  <div class="handle">@focuslabs.ai</div>

  <!-- IMAGE (BOTTOM-ANCHORED, EXPANDS UP) -->
  <div class="image-box">
    <img src="image.png" alt="visual">
  </div>

  <!-- Accent -->
  <div class="bar"></div>
  <div class="circle">SWIPE</div>

</div>
</body>
</html>
