<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pattern Break</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:linear-gradient(135deg,#111,#0a0a0a);
  color:#fff;
  padding:100px 90px;
  position:relative;
  overflow:hidden;
}

.grain {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  opacity:0.04;
  pointer-events:none;
  z-index:0;
}

.brand {
  font-size:30px;
  color:#cfcfcf;
  opacity:.85;
  position:relative;
  z-index:1;
}

.content {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 90px;
}

.heading {
  font-family:'Inter',sans-serif;
  font-size:65px;
  font-weight:600;
  letter-spacing:-0.06em;
  line-height:0.9;
  max-width:820px;
  text-shadow:
    0 -1px 0 rgba(255,255,255,0.5),
    0 1px 1px rgba(0,0,0,0.08);
}

.serif {
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:90px;
  font-weight:500;
}

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:30px;
  opacity:.7;
  z-index:3;
}

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --accent:#e84a24;
  --bar-height-pos: calc(var(--circle-bottom) + (var(--circle-size) / 2));
}

.bar {
  position:absolute;
  left:0;
  width:100%;
  height:12px;
  background:var(--accent);
  bottom:var(--bar-height-pos);
  z-index:2;
}
</style>
</head>

<body>
<div class="slide">

  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)"/>
  </svg>

  <div class="brand">Focus Labs AI</div>

  <div class="content">
    <div class="heading">{{HEADING}}</div>
  </div>

  <div class="handle">@focuslabs.ai</div>
  <div class="bar"></div>

</div>
</body>
</html>
