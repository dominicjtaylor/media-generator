<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Content Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:#F5F5F5;
  color:#111;
  position:relative;
  overflow:hidden;
}

/* ---------- CONTENT LAYOUT ---------- */

.content {
  position: absolute;

  top: 50px;       /* start of your top zone */
  height: 400px;    /* controls vertical centering region */

  left: 70px;       /* aligns perfectly with handle */
  right: 70px;      /* keeps consistent right margin */

  display: flex;
  flex-direction: column;
  justify-content: center;   /* vertical centering within zone */
  align-items: center;   /* left aligned */
  text-align: center;
  gap: 20px;
}

/* ---------- TOP ROW ---------- */

.top-row {
  display:inline-flex;
  align-items:center;
  gap:12px;
}

/* .swipe {
  border:1px solid rgba(10,10,10,.4);
  border-radius:999px;
  padding:6px 18px;
  font-size:24px;
  letter-spacing:3px;
} */

.tag {
  background: #e84a24;
  color: #fff;
  border-radius: 999px;
  padding: 5px 16px;
  font-size: 18px;
  letter-spacing: 3px;
}

/* ---------- HEADING ---------- */

.heading-wrap {
  display:flex;
  align-items:stretch;  /* key change */
  gap:18px;
}

/* .heading {
  font-family:'Anton', sans-serif;
  font-size:70px;
  line-height:1.1;
  max-width:820px;
} */

.heading {
  text-align:center;
  font-family:'Inter', sans-serif;
  color: #111;
  font-size: 70px;
  font-weight: 600;
  letter-spacing: -0.06em;
  line-height: 0.9;
  display: block;
  text-shadow:
    0 -1px 0 rgba(255,255,255,0.5),
    0 1px 1px rgba(0,0,0,0.08);
}

/* ---------- DIVIDER ---------- */

.divider {
  height:2px;
  width:900px;
  background:#e84a24;
}

/* ---------- TEXT ---------- */

/* .text {
  font-size:37px;
  font-weight:300;
  line-height:1.;
  max-width:900px;
} */

.text {
  font-family:'Inter', sans-serif;
  color: #111;
  font-size: 37px;
  font-weight: 300;
  letter-spacing: -0.06em;
  line-height: 1.1;
  display: block;
}

.text strong {
  font-weight:700;
}

.serif {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 37px;
  font-weight: 300;
}

/* ---------- IMAGE ---------- */

.image-box {
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  width:auto;
  height:clamp(340px, 70vh, 850px);
  border-radius:28px;
  overflow:hidden;
  z-index:2;
  border: 3px solid #111;
  display: inline-block;
}

.image-box img {
  width:auto;
  height:100%;
  object-fit:block;
}

/* ---------- FOOTER ---------- */

.brand {
  position: absolute;
  top: 60px;
  left: 90px;

  font-size:28px;
  color:#111;
  opacity:.85;
}

.slide-counter {
  position:absolute;
  bottom:60px;
  left:40px;
  font-size:28px;
  color:rgba(10,10,10,.3);
}

/* ---------- ACCENT BAR ---------- */

.bar {
  position:absolute;
  left:0;
  width:100%;
  height:12px;
  background:#e84a24;
  bottom:200px;
}

/* arrows */
/* .bar::before,
.bar::after {
  content: "";
  position: absolute;
  right: 60px;              
  
  width: 40px;
  height: 40px;

  border-top: 10px solid #e84a24;
  border-right: 10px solid #e84a24;

  transform: rotate(45deg); 
} */

/* .bar::before {
  top: -19px;                
  opacity: 0;
}

.bar::after {
  top: -19px;
  right: 5px;              
} */

</style>
</head>

<body>
<div class="slide">

  <!-- <div class="slide-counter">{{SLIDE_COUNTER}}</div> -->

  <div class="content">

    <div class="tag">{{TAG}}</div>

    <div class="heading-wrap">
      <div class="heading">{{HEADING}}</div>
    </div>

    <div class="divider"></div>

    <div class="text">{{TEXT}}</div>

  </div>

  <div class="image-box">
    <img src="image.png" alt="visual">
  </div>

  <div class="bar"></div>

</div>
</body>
</html>
