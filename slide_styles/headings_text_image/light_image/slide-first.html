<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Slide 1</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:#F7F6F5;
  color:#111;
  position:relative;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:100px;
}

/* ---------- HANDLE ---------- */

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:34px;
  opacity:.7;
  z-index:3;
}

/* ---------- CENTRED CONTENT BLOCK ---------- */

.content-center {
  position: absolute;

  top: 100px;
  bottom: 100px;
  left: 80px;
  right: 80px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* ---------- SWIPE ---------- */

.tag {
  margin-top: -820px;
  display: inline-block;
  background: #e84a24;
  color: #fff;
  border-radius: 999px;
  padding: 6px 18px;
  font-size: 24px;
  letter-spacing: 3px;
  font-weight: 600;
}

/* ---------- HEADLINE ---------- */

.headline {
  margin-top: 30px;
  font-family:'Anton', sans-serif;
  font-size:100px;
  line-height:1.05;
  text-align:center;
  color:#111;

  /* subtle edge definition for light bg */
  text-shadow:
    0 -1px 0 rgba(255,255,255,0.5),
    0 1px 1px rgba(0,0,0,0.08);
}

.headline strong {
  font-weight:700;
}

/* ---------- IMAGE SYSTEM ---------- */

.image-box {
  position:absolute;
  bottom:150px;
  left:50%;
  transform:translateX(-50%);
  width:1000px;
  height:clamp(320px, 46vh, 850px);
  border-radius:28px;
  overflow:hidden;
  z-index:1;
}

.image-box img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

/* ---------- ACCENT SYSTEM ---------- */

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --circle-right:80px;
  --accent:#e84a24;
}

.circle {
  position:absolute;
  right:var(--circle-right);
  bottom:var(--circle-bottom);
  width:var(--circle-size);
  height:var(--circle-size);
  background:var(--accent);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:600;
  color:#fff;
  z-index:2;
}

.bar {
  position:absolute;
  height:12px;
  background:var(--accent);
  bottom:calc(var(--circle-bottom) + (var(--circle-size) / 2));
  left:calc(100% - var(--circle-right) - (var(--circle-size) / 2));
  width:calc(var(--circle-right) + (var(--circle-size) / 2));
  z-index:1;
}

</style>
</head>

<body>
<div class="slide">

  <div class="content-center">
    <div class="tag">FROM THE FEED</div>
    <div class="headline">{{TEXT}}</div>
  </div>

  <div class="handle">@focuslabsai</div>

  <div class="image-box">
    <img src="image.png" alt="visual">
  </div>

  <div class="bar"></div>
  <div class="circle">SWIPE</div>

</div>
</body>
</html>
