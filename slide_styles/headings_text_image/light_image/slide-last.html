<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Final Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:#F7F6F5;
  color:#111;
  position:relative;
  overflow:hidden;
}

/* ---------- CONTENT (CENTERED) ---------- */

.content {
  position: absolute;
  inset: 0;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;

  padding: 0 90px;
}

/* ---------- BRAND ---------- */

.brand {
  position: absolute;
  top: 100px;
  left: 90px;

  font-size:30px;
  color:#111;
  opacity:.85;
}

/* ---------- HEADLINE ---------- */

.headline {
  font-family:'Anton', sans-serif;
  font-size:105px;
  line-height:1.05;
  max-width:820px;

  color:#111;

  /* subtle edge definition (clean, not glowy) */
  text-shadow:
    0 -1px 0 rgba(255,255,255,0.4),
    0 1px 1px rgba(0,0,0,0.08);
}

.headline strong {
  font-weight:700;
}

/* ---------- CTA ---------- */

.cta {
  margin-top:40px;
  display:inline-flex;
  align-items:center;
  gap:12px;

  border:1px solid rgba(10,10,10,.3);
  border-radius:999px;

  padding:12px 24px;
  font-size:30px;
  color:#111;
}

.logo {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* ---------- HANDLE ---------- */

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:30px;
  opacity:.7;
  color:#111;
}

/* ---------- ACCENT SYSTEM ---------- */

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --circle-right:80px;
  --accent:#e84a24;
  --bar-height-pos: calc(var(--circle-bottom) + (var(--circle-size) / 2));
}

.circle {
  position:absolute;
  right:var(--circle-right);
  bottom:var(--circle-bottom);

  width:var(--circle-size);
  height:var(--circle-size);

  background:var(--accent);
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2;
}

.bar {
  position:absolute;
  height:12px;
  background:var(--accent);

  bottom:var(--bar-height-pos);
  left:0;

  width:calc(100% - var(--circle-right) - (var(--circle-size) / 2));
  z-index:1;
}

/* ---------- ICON ---------- */

.bookmark {
  width:40px;
  height:50px;
  background:#fff;

  clip-path: polygon(0 0,100% 0,100% 100%,50% 75%,0 100%);
}

/* ---------- TOP RIGHT ARROWS ---------- */

.top-arrow {
  position:absolute;
  top:40px;
  right:130px;

  width:30px;
  height:60px;
  opacity:0.6;
}

.top-arrow::before,
.top-arrow::after {
  content:"";
  position:absolute;
  left:0;

  width:30px;
  height:30px;

  border-top:3px solid var(--accent);
  border-right:3px solid var(--accent);

  transform:rotate(-45deg);
}

.top-arrow::before {
  top:0;
}

.top-arrow::after {
  top:20px;
  opacity:0.5;
}

</style>
</head>

<body>
<div class="slide">

  <div class="brand">Focus Labs AI</div>

  <div class="content">
    <div class="headline">
      {{TEXT}}
    </div>

    <div class="cta">
      <img src="../../../logo_light.png" class="logo">
      Focus Labs AI
    </div>
  </div>

  <div class="handle">@focuslabs.ai</div>

  <div class="bar"></div>

  <div class="circle">
    <div class="bookmark"></div>
  </div>

  <div class="top-arrow"></div>

</div>
</body>
</html>
