<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Content Slide</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

.slide {
  width:1080px;
  height:1350px;
  background:linear-gradient(135deg,#111,#0a0a0a);
  color:#fff;
  padding:100px 90px;
  position:relative;
  overflow:hidden;
}

/* ---------- TEXT ---------- */

.brand {
  font-size:34px;
  color:#cfcfcf;
  opacity:.85;
}

.swipe {
  margin-top:120px;
  display:inline-block;
  border:1px solid rgba(255,255,255,.4);
  border-radius:999px;
  padding:6px 18px;
  font-size:24px;
  letter-spacing:3px;
  color:#ccc;
}

.heading {
  margin-top:50px;
  font-size:80px;
  font-weight:550;
  line-height:1.1;
  max-width:820px;
}

.text {
  margin-top:20px;
  font-size:44px;
  font-weight:300;
  line-height:1.1;
  max-width:820px;
}

.text strong {
  font-weight:700;
}

.cta {
  margin-top:70px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  border:1px solid rgba(255,255,255,.4);
  border-radius:999px;
  padding:12px 24px;
  font-size:26px;
}

.logo {
  width:40px;
  height:40px;
  border-radius:50%;
}

.handle {
  position:absolute;
  bottom:80px;
  left:90px;
  font-size:34px;
  opacity:.7;
}

/* ---------- SHARED ACCENT SYSTEM ---------- */

:root {
  --circle-size:160px;
  --circle-bottom:120px;
  --accent:#e84a24;

  /* derived value = EXACT bar height */
  --bar-height-pos: calc(var(--circle-bottom) + (var(--circle-size) / 2));
}

.bar {
  position:absolute;
  left:0;
  width:100%;
  height:12px;
  background:var(--accent);
  bottom:var(--bar-height-pos);
}

/* ---------- BIG NUMBER (FIXED PROPERLY) ---------- */

.big-number {
  position:absolute;
  right:60px;

  /* anchor just BELOW the bar */
  bottom:calc(var(--bar-height-pos) + 100px);

  font-size:340px;
  line-height:0.75;
  font-weight:800;

  /* visible but not overpowering */
  color:transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.12);

  /* subtle glow for contrast */
  /* text-shadow: 0 0 30px rgba(232,74,36,0.15); */

  pointer-events:none;
  user-select:none;
}

/* Optional: slight depth layering */
.bar {
  z-index:2;
}

.big-number {
  z-index:1;
}

</style>
</head>

<body>
<div class="slide">

  <div class="brand">Claude Insights</div>

  <div class="swipe">SWIPE</div>

  <div class="heading">
    {{HEADING}}
  </div>

  <div class="text">
    {{TEXT}}
  </div>

  <div class="cta">
    <img src="../../logo.png" class="logo">
    Claude Insights
  </div>

  <div class="handle">@claudeinsights</div>

  <!-- Seamless bar continuation -->
  <div class="bar"></div>

  <!-- Large background number -->
  <div class="big-number">{{NUMBER}}</div>

</div>
</body>
</html>
