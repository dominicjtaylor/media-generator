<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Carousel Slide</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0e0e0e;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(135deg, #111, #0a0a0a);
      color: #fff;
      padding: 80px;
      position: relative;
    }

    /* Top branding */
    .brand-top {
      font-size: 22px;
      color: #cfcfcf;
      opacity: 0.9;
    }

    /* Swipe pill */
    .swipe {
      margin-top: 120px;
      display: inline-block;
      border: 1px solid #888;
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 14px;
      letter-spacing: 2px;
      color: #ccc;
    }

    /* Main headline */
    .headline {
      margin-top: 40px;
      font-size: 72px;
      font-weight: 300;
      line-height: 1.15;
      color: #e6e6e6;
    }

    .headline strong {
      font-weight: 700;
      color: #ffffff;
    }

    /* CTA pill */
    .cta {
      margin-top: 50px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #666;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 18px;
      color: #ddd;
    }

    .cta-dot {
      width: 18px;
      height: 18px;
      background: #ff4d2d;
      border-radius: 50%;
    }

    /* Bottom handle */
    .handle {
      position: absolute;
      bottom: 60px;
      left: 80px;
      font-size: 20px;
      color: #bfbfbf;
      opacity: 0.8;
    }

  </style>
</head>

<body>
  <div class="slide">

    <div class="brand-top">Claude Insights</div>

    <div class="swipe">SWIPE</div>

    <div class="headline">
      Level up your career <br>
      with <strong>new skills</strong>
    </div>

    <div class="cta">
      <div class="cta-dot"></div>
      Claude Insights
    </div>

    <div class="handle">@claudeinsights</div>

  </div>
</body>
</html>
